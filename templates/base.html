<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SurfLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="app-header">
    <a class="brand" href="/">SurfLog</a>
    <nav class="main-nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/spots">Surf Spots</a>
        <a href="/logs">All Logs</a>
        <a href="/logs/new">New Log</a>
        <a href="/journal">Journal</a>
    </nav>
</header>

<div class="page-shell">
    <aside class="page-sidebar">
        {% block sidebar %}{% endblock %}
    </aside>

    <main class="page-main">
        {% block content %}{% endblock %}
    </main>
</div>

{% block scripts %}{% endblock %}

</body>
</html>
